<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carissera</title>
<link
  rel="shortcut icon"
  href="carisseralogo.jpg"
/>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
      background: #020b3f;
    }

    /* ========================= */
    /* HERO BACKGROUND */
    /* ========================= */

    .hero-bg {
      min-height: 100vh;
      position: relative;
      overflow: hidden;

      background:
        radial-gradient(circle at top,
        #1027a0 0%,
        #020b3f 55%,
        #010625 100%);
    }

    /* ========================= */
    /* STARS */
    /* ========================= */

    .stars {
      position: absolute;
      inset: 0;

      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);

      background-size: 120px 120px;

      background-position:
        0 0,
        60px 80px,
        100px 40px;

      opacity: 0.4;
    }

    /* ========================= */
    /* LOGO FONT */
    /* ========================= */

.logo-font {

  font-family: "Titan One", sans-serif;

  font-weight: normal;

  letter-spacing: 2px;

  color: #f5f5f5;

  -webkit-text-stroke: 3px #15155c;

  text-shadow:
    0 4px 0 #11114d,
    0 8px 20px rgba(0,0,0,0.35),
    0 0 12px rgba(255,255,255,0.08);

  transform: rotate(0deg);

  line-height: 1;

  display: inline-block;
}

    /* ========================= */
    /* FLOATING */
    /* ========================= */

    .floating {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    /* ========================= */
    /* BLUR LIGHT */
    /* ========================= */

    .blur-light {
      position: absolute;

      width: 350px;
      height: 350px;

      border-radius: 999px;

      background: rgba(72, 118, 255, 0.25);

      filter: blur(120px);

      z-index: 0;
    }

    /* ========================= */
    /* MOON FRAME */
    /* ========================= */

 .moon-frame {

  position: relative;

  width: 340px;
  height: 340px;

  border-radius: 50%;

  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  background:
    radial-gradient(
      circle at top,
      #ffe27a,
      #ffcb42 70%
    );

  box-shadow:
    0 0 50px rgba(255,223,120,0.5),
    0 0 120px rgba(255,223,120,0.25);

  border:
    2px solid rgba(255,255,255,0.12);
}

    /* efek bulan */
.moon-frame::after {

  content: "";

  position: absolute;

  inset: 0;

  border-radius: 50%;

  background:
    radial-gradient(
      circle at 72% 30%,
      rgba(0,0,0,0.28),
      transparent 58%
    );

  z-index: 1;
}

.moon-img {

  position: absolute;

  inset: 0;

  width: 100%;
  height: 100%;

  object-fit: cover;

  object-position: center 15%;

  clip-path: circle(44% at 50% 50%);

  opacity: 0;

  transition:
    opacity 1.2s ease,
    transform 6s ease;

  transform: scale(1.08);

  z-index: 2;
}

/* FOTO ACTIVE */

.moon-img.active {

  opacity: 1;

  transform: scale(1);
}

/* ========================= */
/* MOBILE DROPDOWN MENU */
/* ========================= */

.mobile-menu {

  position: fixed;

  top: 64px;
  left: 50%;

  transform:
    translateX(-50%)
    translateY(-20px);

  width: calc(100% - 28px);
  max-width: 320px;

  background: rgba(7,15,70,0.88);

  backdrop-filter: blur(16px);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius: 16px;

  padding: 14px;

  display: flex;
  flex-direction: column;

  gap: 8px;

  opacity: 0;
  visibility: hidden;

  transition: 0.35s ease;

  z-index: 40;
}

/* ACTIVE */

.mobile-menu.active {

  opacity: 1;
  visibility: visible;

  transform:
    translateX(-50%)
    translateY(0px);
}

/* ========================= */
/* MOBILE MENU LINK */
/* ========================= */

.mobile-menu a {

  display: flex;
  align-items: center;
  justify-content: space-between;

  color: white;

  text-decoration: none;

  font-size: 0.85rem;
  font-weight: 500;

  padding: 10px 4px;

  border-bottom:
    1px solid rgba(255,255,255,0.08);

  transition: 0.3s ease;
}

/* HOVER */

.mobile-menu a:hover {

  color: #9bb8ff;

  padding-left: 12px;
}

/* PANAH */

.mobile-menu a::after {

  content: "→";

  opacity: 0.7;

  transition: 0.3s ease;
}

/* PANAH HOVER */

.mobile-menu a:hover::after {

  transform: translateX(5px);

  opacity: 1;
}

/* LAST CHILD */

.mobile-menu a:last-child {

  border-bottom: none;
}

.mobile-menu::before {

  content: "";

  position: absolute;

  top: -6px;
  right: 22px;

  width: 12px;
  height: 12px;

  background: rgba(7,15,70,0.88);

  transform: rotate(45deg);

  border-left:
    1px solid rgba(255,255,255,0.08);

  border-top:
    1px solid rgba(255,255,255,0.08);
}

/* ========================= */
/* LAST MENU */
/* ========================= */

.mobile-menu a:last-child {

  border-bottom: none;
}

/* ========================= */
/* HAMBURGER */
/* ========================= */

.hamburger {

  width: 28px;
  height: 20px;

  position: relative;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  cursor: pointer;

  z-index: 60;
}

/* GARIS */

.hamburger span {

  width: 100%;
  height: 3px;

  background: white;

  border-radius: 999px;

  transition: 0.5s ease;
}

/* LOVE */

.heart-shape {

  position: absolute;

  top: 50%;
  left: 50%;

  width: 18px;
  height: 18px;

  background: white;

  transform:
    translate(-50%, -50%)
    rotate(-45deg)
    scale(0);

  opacity: 0;

  transition: 0.5s ease;
}

/* BULATAN LOVE */

.heart-shape::before,
.heart-shape::after {

  content: "";

  position: absolute;

  width: 18px;
  height: 18px;

  background: white;

  border-radius: 50%;
}

.heart-shape::before {

  top: -9px;
  left: 0;
}

.heart-shape::after {

  left: 9px;
  top: 0;
}

/* ACTIVE */

/* garis hilang */

.hamburger.active span {

  opacity: 0;

  transform: scale(0);
}

/* love muncul */

.hamburger.active .heart-shape {

  opacity: 1;

  transform:
    translate(-50%, -50%)
    rotate(-45deg)
    scale(1);
}

    /* ========================= */
    /* RESPONSIVE */
    /* ========================= */

@media (max-width: 768px) {

  .moon-frame {

    width: 280px;
    height: 280px;
  }

  .moon-frame::after {

    inset: 0;

    width: 100%;
    height: 100%;

    border-radius: 50%;
  }

  .hero-content {
    text-align: center;
  }

  .socials {
    justify-content: center;
  }

  .icons {
    justify-content: center;
  }

}

/* ========================= */
/* CUSTOM SCROLLBAR */
/* ========================= */

::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: #020b3f;
}

::-webkit-scrollbar-thumb {

  background:
    linear-gradient(
      180deg,
      #6ea0ff,
      #3f6fff
    );

  border-radius: 999px;
}

::-webkit-scrollbar-thumb:hover {

  background:
    linear-gradient(
      180deg,
      #8ab3ff,
      #5c82ff
    );
}

/* ========================= */
/* STICKY NAVBAR */
/* ========================= */

#navbar {
  transition: 0.4s ease;
}

#navbar.scrolled {
  background: rgba(2,11,63,0.82);

  backdrop-filter: blur(14px);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.25);

  padding-top: 14px;
  padding-bottom: 14px;
}

/* ========================= */
/* SCROLL PROGRESS BAR */
/* ========================= */

#progressBar {
  position: fixed;

  top: 0;
  left: 0;

  width: 0%;
  height: 4px;

  background: linear-gradient(
    90deg,
    #7aa2ff,
    #3f6fff,
    #9bb8ff
  );

  z-index: 9999;

  box-shadow:
    0 0 12px rgba(91,140,255,0.8);
}

/* ========================= */
/* HIDE MOBILE MENU DI DESKTOP */
/* ========================= */

@media (min-width: 768px) {

  .mobile-menu {
    display: none !important;
  }

}

#navbar img{

  box-shadow:
    0 0 20px rgba(255,255,255,0.18);

  transition: 0.35s ease;
}

#navbar img:hover{

  transform:
    scale(1.08)
    rotate(3deg);

  box-shadow:
    0 0 30px rgba(255,255,255,0.28);
}

@media (max-width: 768px){

  /* ========================= */

  /* ========================= */

}

@media (max-width: 768px){

  .icons{

    display: flex;

    justify-content: center;

    align-items: center;
  }

}

.official-text{

.carissera-desc{

/* ========================= */
/* HERO INTRO ANIMATION */
/* ========================= */

.fade-up {

  opacity: 0;

  transform: translateY(35px);

  animation: fadeUp 1.0s ease forwards;

  will-change:
    transform,
    opacity;
}

/* DELAY */

.delay-1 {
  animation-delay: 0.1s;
}

.delay-2 {
  animation-delay: 0.25s;
}

.delay-3 {
  animation-delay: 0.4s;
}

.delay-4 {
  animation-delay: 0.55s;
}

@keyframes fadeUp {

  from {

    opacity: 0;

    transform: translateY(35px);
  }

  to {

    opacity: 1;

    transform: translateY(0);
  }

}

/* ========================= */
/* REALISTIC SHOOTING STAR */
/* ========================= */

.shooting-star {

  position: absolute;

  width: 160px;
  height: 2px;

  border-radius: 999px;

  opacity: 0;

  z-index: 2;

  pointer-events: none;

  overflow: visible;

  transform:
    rotate(35deg);
}

/* HEAD */

.shooting-star::before {

  content: "";

  position: absolute;

  right: 0;
  top: 50%;

  width: 6px;
  height: 6px;

  border-radius: 50%;

  background: white;

  transform: translateY(-50%);

  box-shadow:
    0 0 10px rgba(255,255,255,1),
    0 0 20px rgba(255,255,255,0.9),
    0 0 35px rgba(255,255,255,0.6);
}

/* TAIL */

.shooting-star::after {

  content: "";

  position: absolute;

  inset: 0;

  border-radius: 999px;

  background:
    linear-gradient(
      90deg,
      rgba(255,255,255,0),
      rgba(255,255,255,0.9)
    );

  filter: blur(1px);
}

/* STAR 1 */

.star-1 {

  top: 8%;
  left: -200px;

  animation:
    realisticMeteor 16s linear infinite;

  animation-delay: 1s;
}

/* STAR 2 */

.star-2 {

  top: 18%;
  left: -240px;

  animation:
    realisticMeteor 20s linear infinite;

  animation-delay: 7s;
}

/* STAR 3 */

.star-3 {

  top: 4%;
  left: -180px;

  animation:
    realisticMeteor 18s linear infinite;

  animation-delay: 13s;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes realisticMeteor {

  0% {

    transform:
      translate(0,0)
      rotate(35deg);

    opacity: 0;
  }

  3% {

    opacity: 1;
  }

  10% {

    opacity: 1;
  }

  18% {

    opacity: 0;
  }

  100% {

    transform:
      translate(1600px, 850px)
      rotate(35deg);

    opacity: 0;
  }

}

/* ========================= */
/* NAVBAR ACTIVE MENU */
/* ========================= */

nav ul li a{

  position: relative;

  color: rgba(255,255,255,0.78);

  transition: 0.35s ease;
}

/* HOVER */

nav ul li a:hover{

/* ACTIVE */

}

/* ========================= */
/* DESKTOP MODE ON PHONE */
/* ========================= */

@media (min-width: 769px) and (max-width: 1100px) {

  /* NAVBAR */
  #navbar {

    padding-left: 24px !important;

  }

  }

}
  </style>
</head>

  <script>
/* ========================= */
/* NAVBAR SCROLL EFFECT */
/* ========================= */

const navbar = document.getElementById("navbar");

window.addEventListener("scroll", () => {

  if(window.scrollY > 50){

    navbar.classList.add("scrolled");

  } else {

    navbar.classList.remove("scrolled");

  }

});
  </script>

  <script>
/* ========================= */
/* SCROLL PROGRESS */
/* ========================= */

const progressBar = document.getElementById("progressBar");

window.addEventListener("scroll", () => {

  const scrollTop = window.scrollY;

  const docHeight =
    document.documentElement.scrollHeight -
    document.documentElement.clientHeight;

  const progress =
    (scrollTop / docHeight) * 100;

  progressBar.style.width = progress + "%";

});
  </script>

  <script>
/* ========================= */
/* RESET MENU DESKTOP */
/* ========================= */

window.addEventListener("resize", () => {

  if(window.innerWidth >= 768){

    mobileMenu.classList.remove("active");

    menuBtn.classList.remove("active");

  }

});
  </script>

<script>

/* ========================= */
/* SMOOTH CROSSFADE IMAGE */
/* ========================= */

const images = [
  "carissa1.jpeg",
  "carissa2.jpeg",
  "carissa3.jpeg",
  "carissa4.jpeg"
];

const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");

let current = 0;
let showingFirst = true;

setInterval(() => {

  current++;

  if(current >= images.length){
    current = 0;
  }

  if(showingFirst){

    img2.src = images[current];

    img2.classList.add("active");
    img1.classList.remove("active");

  } else {

    img1.src = images[current];

    img1.classList.add("active");
    img2.classList.remove("active");
  }

  showingFirst = !showingFirst;

}, 4500);

</script>
